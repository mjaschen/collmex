name: Collmex API Integration Tests

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
    workflow_dispatch:

jobs:
    integration-test:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                php-version:
                    - "8.4"

        name: "Collmex API Integration - PHP ${{ matrix.php-version }}"

        steps:
            -   uses: actions/checkout@v6

            -   name: Setup PHP
                if: ${{ env.GITEA_ACTIONS != 'true' }}
                uses: shivammathur/setup-php@v2
                with:
                    php-version: ${{ matrix.php-version }}
                    ini-file: development
                    coverage: xdebug
                    tools: pecl
                    extensions: curl,fileinfo,json,zip,bcmath

            -   name: Setup PHP (self-hosted)
                if: ${{ env.GITEA_ACTIONS == 'true' }}
                uses: shivammathur/setup-php@v2
                with:
                    php-version: ${{ matrix.php-version }}
                    ini-file: development
                    coverage: xdebug
                    tools: pecl
                    extensions: curl,fileinfo,json,zip,bcmath
                env:
                    runner: self-hosted

            -   name: Validate composer.json and composer.lock
                run: composer validate

            -   name: Get Composer cache directory
                id: composer-cache-dir
                run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

            -   name: Cache Composer downloads
                uses: actions/cache@v5
                with:
                    path: ${{ steps.composer-cache-dir.outputs.dir }}
                    key: ${{ runner.os }}-composer-cache-${{ matrix.php-version }}-${{ hashFiles('composer.json', 'composer.lock') }}
                    restore-keys: |
                        ${{ runner.os }}-composer-cache-${{ matrix.php-version }}-
                        ${{ runner.os }}-composer-cache-

            -   name: Install dependencies
                run: composer update --no-progress --prefer-stable --prefer-dist

            -   name: Run Integration Tests
                env:
                    COLLMEX_USER: ${{ secrets.COLLMEX_USER }}
                    COLLMEX_PASSWORD: ${{ secrets.COLLMEX_PASSWORD }}
                    COLLMEX_CUSTOMER: ${{ secrets.COLLMEX_CUSTOMER }}
                run: composer run-script ci:tests-integration
